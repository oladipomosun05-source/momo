services:
  # 1. Backend Web Service
  - type: web
    name: privacyframeworkb
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: mongodb+srv://oladipomosun05_db_user:lACTcaY0b0ExLl10@cluster0.aulccqs.mongodb.net/privacy_framework?retryWrites=true&w=majority
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
