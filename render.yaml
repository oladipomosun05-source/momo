services:
  # Backend API
  - type: web
    runtime: node
    name: privacyframeworkb
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: PORT
        value: 10000

      - key: MONGODB_URI
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: CORS_ORIGIN
        value: https://privacyframework.onrender.com

  # Frontend Static Site
  - type: web
    runtime: static
    name: privacyframework
    plan: free
    rootDir: finalyearprojectlatest

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://privacyframeworkb.onrender.com

    routes:
      - type: rewrite
        source: /*
        destination: /index.html